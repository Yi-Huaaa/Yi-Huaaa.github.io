bio: |
  I am a fourth-year Ph.D. student in the Department of Electrical and Computer Engineering at UW-Madison, advised by Prof. [Tsung-Wei (TW) Huang](https://tsung-wei-huang.github.io/). My research focuses on GPU-accelerated algorithms for compiler optimization, graph partitioning, and design automation applications.

  I developed SimPart, a GPU-parallel graph partitioner for logic simulation by integrating disjoint-set and replication-aided strategies, further optimized with conditional CUDA Graphs. I also collaborate with Synopsys to develop GPU-parallel algorithms for gate sizing in an industrial-use EDA tool.

